name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test_suit:
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        os: [windows-latest, ubuntu-latest]
        experimental: [false]
        include:
          - python-version: "3.14t"
            os: ubuntu-latest
            experimental: true
          - python-version: "3.14t"
            os: windows-latest
            experimental: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          python-version: ${{ matrix.python-version }}

      - uses: pyvista/setup-headless-display-action@v3
        with:
          qt: true

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Run tests
        run: uv run pytest -k "not integration and not qt"
  test_qt:
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        os: [ubuntu-latest]
        experimental: [false]
        include:
          - python-version: "3.14t"
            os: ubuntu-latest
            experimental: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          python-version: ${{ matrix.python-version }}

      - uses: pyvista/setup-headless-display-action@v3
        with:
          qt: true

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Install Qt test dependencies
        run: uv pip install pyqt5 pytest-qt

      - name: Run qt tests
        run: uv run pytest -k "qt"
